apiVersion: apps/v1
kind: Deployment
metadata:
  name: html-app
  namespace: argocdv1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: html-app
  template:
    metadata:
      labels:
        app: html-app
    spec:
      containers:
      - name: nginx
        image: rohanworld101/my-html-app:9bccded1e71e951c07fbec90407a67e5cd71f4a5
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: html-service
spec:
  type: NodePort  #ClusterIP is bydefault, changing to NodePort
  selector:
    app: html-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080 # Mapping VM Port 30080 -> port 80
