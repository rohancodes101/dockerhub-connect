apiVersion: apps/v1
kind: Deployment
metadata:
  name: html-app
  namespace: argocdv1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: html-app
  template:
    metadata:
      labels:
        app: html-app
    spec:
      containers:
      - name: nginx
        image: rohancodes101/dockerhub-connect:latest # GA will update this tag
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: html-service
spec:
  selector:
    app: html-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
