name: Build, Push and Update K8s

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          # Use the GitHub Commit SHA as the tag
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/my-html-app:${{ github.sha }}

      - name: Update K8s Manifest
        run: |
          # Use 'sed' to replace the image tag in your deployment file
          sed -i "s|image: .*|image: ${{ secrets.DOCKER_HUB_USERNAME }}/my-html-app:${{ github.sha }}|g" k8s/deployment.yaml
          
          # Commit the change back to the repo
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add k8s/deployment.yaml
          git commit -m "chore: update image tag to ${{ github.sha }}"
          git push
